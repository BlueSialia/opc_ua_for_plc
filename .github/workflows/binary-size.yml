name: Binary size

on:
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Check binary size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore baseline from cache
        id: cache-baseline
        uses: actions/cache/restore@v5
        with:
          path: baseline.json
          key: binary-baseline-${{ github.run_id }}
          restore-keys: binary-baseline-

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Measure PR binary sizes
        run: |
          find target/release -maxdepth 1 -type f -executable \
            -exec stat --format='%n %s' {} \; \
            | sort \
            | jq -R 'split(" ") | {(.[0] | split("/")[-1]): (.[1] | tonumber)}' \
            | jq -s add > pr-sizes.json
          echo "PR binary sizes:"
          cat pr-sizes.json

      - name: Install cargo-bloat
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bloat

      - name: Analyze with cargo-bloat
        run: |
          echo "## cargo bloat (largest crates)" >> bloat-report.md
          echo '```' >> bloat-report.md
          cargo bloat --release --crates -n 20 >> bloat-report.md
          echo '```' >> bloat-report.md

      - name: Compare with baseline
        if: steps.cache-baseline.outputs.cache-hit == 'true'
        run: |
          echo "Comparing PR sizes with baseline..."
          THRESHOLD=10

          for bin in $(jq -r 'keys[]' pr-sizes.json); do
            pr_size=$(jq -r ".[\"$bin\"]" pr-sizes.json)
            base_size=$(jq -r ".[\"$bin\"] // 0" baseline.json)

            if [ "$base_size" = "0" ]; then
              echo "::warning::New binary '$bin' detected (no baseline). Size: $pr_size bytes"
              continue
            fi

            diff=$(( pr_size - base_size ))
            pct=$(echo "scale=2; $diff * 100 / $base_size" | bc)

            if [ "$diff" -gt 0 ]; then
              if [ "$(echo "$pct > $THRESHOLD" | bc)" = "1" ]; then
                echo "::error::$bin grew by $pct% ($base_size -> $pr_size bytes, +$diff bytes). Threshold is ${THRESHOLD}%."
                exit 1
              else
                echo "::notice::$bin grew by $pct% ($base_size -> $pr_size bytes, +$diff bytes). Within threshold."
              fi
            elif [ "$diff" -lt 0 ]; then
              echo "::notice::$bin shrank by ${pct#-}% ($base_size -> $pr_size bytes)."
            else
              echo "::notice::$bin unchanged ($pr_size bytes)."
            fi
          done

      - name: Post size report as PR comment
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          filePath: bloat-report.md
          comment_tag: binary-size
