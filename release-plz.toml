# release-plz configuration
# See: https://release-plz.ieni.dev/

[workspace]
git_release_type = "auto"
git_only = true
release_always = false

# All packages write to a single root CHANGELOG.md.
# Crates are workspace-internal and not published to crates.io.
# release-plz handles changelog generation, version bumping, and GitHub releases only.

[[package]]
name = "core-model"
changelog_path = "../CHANGELOG.md"

[[package]]
name = "driver-common"
changelog_path = "../../CHANGELOG.md"

[[package]]
name = "driver-fins"
changelog_path = "../../CHANGELOG.md"

[[package]]
name = "driver-modbus"
changelog_path = "../../CHANGELOG.md"

[[package]]
name = "opcua-server"
changelog_path = "../CHANGELOG.md"

[[package]]
name = "runtime"
changelog_path = "../CHANGELOG.md"
