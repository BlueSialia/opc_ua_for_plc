# release-plz configuration
# See: https://release-plz.ieni.dev/

[workspace]
changelog_update = true
git_release_enable = true
git_release_type = "prod"
git_tag_enable = true
pr_draft = false
allow_dirty = false
repo_url = "https://github.com/BlueSialia/opc_ua_for_plc"

# All packages write to a single root CHANGELOG.md.
# Crates are workspace-internal and not published to crates.io.
# release-plz handles changelog generation, version bumping, and GitHub releases only.

[[package]]
name = "core-model"
changelog_path = "../CHANGELOG.md"

[[package]]
name = "driver-common"
changelog_path = "../../CHANGELOG.md"

[[package]]
name = "driver-fins"
changelog_path = "../../CHANGELOG.md"

[[package]]
name = "driver-modbus"
changelog_path = "../../CHANGELOG.md"

[[package]]
name = "opcua-server"
changelog_path = "../CHANGELOG.md"

[[package]]
name = "runtime"
changelog_path = "../CHANGELOG.md"
