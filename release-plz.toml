# release-plz configuration
# See: https://release-plz.ieni.dev/

[workspace]
changelog_update = true
git_release = true
git_release_type = "prod"
git_tag_enable = true
github_release = true
pr_draft = false
allow_dirty = false
repo_url = "https://github.com/BlueSialia/opc_ua_for_plc"

# Since crates use publish = false, release-plz won't publish to crates.io.
# We only use it for changelog generation, version bumping, and GitHub releases.
